<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Photobooth & 360 Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">Virtual<span>Booth</span></div>
        </header>

        <main>
            <!-- Camera View Area -->
            <div class="camera-section">
                <div id="booth-container" class="booth-container">
                    <video id="camera-stream" autoplay playsinline style="display:none;"></video>
                    <canvas id="capture-canvas"></canvas>
                </div>

                <!-- Flash Effect -->
                <div id="flash-effect" class="flash-effect"></div>
            </div>

            <!-- Controls Area -->
            <div class="controls-section glass">
                
                <!-- Camera Selection -->
                <div class="control-group">
                    <label for="camera-select">📷 Pilih Kamera:</label>
                    <select id="camera-select">
                        <option value="">Memuat kamera...</option>
                    </select>
                </div>

                <!-- Photo Overlay Selection -->
                <div class="control-group">
                    <label>📸 Overlay Foto:</label>
                    <div class="template-options photo-template">
                        <button class="template-btn photo-btn active" data-template="template-none">None</button>
                        <button class="template-btn photo-btn" data-template="template-floral">Floral</button>
                        <button class="template-btn photo-btn" data-template="template-neon">Neon</button>
                        <button class="template-btn photo-btn" data-template="template-cinema">Cinema</button>
                    </div>
                    
                    <div class="custom-overlay-upload">
                        <label for="photo-overlay-upload" class="upload-btn" style="background: #e91e63;">➕ Unggah Overlay Foto (.png)</label>
                        <input type="file" id="photo-overlay-upload" accept="image/png" style="display: none;">
                    </div>
                </div>

                <!-- Video Overlay Selection -->
                <div class="control-group">
                    <label>🎥 Overlay Video 360:</label>
                    <div class="template-options video-template">
                        <button class="template-btn video-btn active" data-template="template-none">None</button>
                        <button class="template-btn video-btn" data-template="template-floral">Floral</button>
                        <button class="template-btn video-btn" data-template="template-neon">Neon</button>
                        <button class="template-btn video-btn" data-template="template-cinema">Cinema</button>
                    </div>
                    
                    <div class="custom-overlay-upload">
                        <label for="video-overlay-upload" class="upload-btn">➕ Unggah Overlay Video (.png)</label>
                        <input type="file" id="video-overlay-upload" accept="image/png" style="display: none;">
                    </div>
                </div>

                <!-- Format Settings -->
                <div class="control-group">
                    <label>📐 Format Layar Hasil:</label>
                    <select id="format-select">
                        <option value="landscape">Landscape (16:9) - Memanjang ke samping</option>
                        <option value="portrait">Portrait (9:16) - Memanjang ke atas</option>
                        <option value="square">Square (1:1) - Kotak</option>
                    </select>
                </div>

                <!-- Camera Adjustments -->
                <div class="control-group">
                    <label>🛠️ Penyesuaian Kamera (Iriun/Webcam):</label>
                    <div class="setting-item" style="margin-bottom: 5px;">
                        <input type="checkbox" id="setting-mirror" checked>
                        <label for="setting-mirror">Efek Cermin (Mirror)</label>
                    </div>
                    <select id="setting-rotation">
                        <option value="0">Rotasi Normal (0°)</option>
                        <option value="90">Putar Kanan (90°)</option>
                        <option value="180">Terbalik (180°)</option>
                        <option value="270">Putar Kiri (270°)</option>
                    </select>
                    
                    <!-- Zoom & Pan Controls -->
                    <div style="margin-top: 15px;">
                        <label style="font-size: 0.9rem; margin-bottom: 5px;">🔍 Zoom (Perbesar):</label>
                        <input type="range" id="setting-zoom" min="1" max="5" step="0.1" value="1" style="width: 100%;">
                    </div>
                    <div style="margin-top: 10px;">
                        <label style="font-size: 0.9rem; margin-bottom: 5px;">↔️ Geser Kiri/Kanan:</label>
                        <input type="range" id="setting-pan-x" min="-1500" max="1500" step="10" value="0" style="width: 100%;">
                    </div>
                    <div style="margin-top: 10px;">
                        <label style="font-size: 0.9rem; margin-bottom: 5px;">↕️ Geser Atas/Bawah:</label>
                        <input type="range" id="setting-pan-y" min="-1500" max="1500" step="10" value="0" style="width: 100%;">
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button id="btn-photo" class="btn-primary">📸 Ambil Foto</button>
                    <button id="btn-video" class="btn-danger">🎥 Rekam Video</button>
                </div>
            </div>
        </main>

        <!-- Results Modal -->
        <div id="result-modal" class="modal hidden">
            <div class="modal-content glass">
                <span id="close-modal" class="close">&times;</span>
                <h2>Hasil Anda</h2>
                <div id="result-container">
                    <!-- Image or Video will be injected here -->
                </div>
                <div class="result-details">
                    <div id="qrcode" class="qrcode-container"></div>
                </div>
                
                <div class="modal-actions">
                    <a id="btn-download" href="#" class="btn-primary" download="photobooth.png">⬇️ Unduh ke Perangkat</a>
                    <button id="btn-print" class="btn-primary" style="background: #4caf50; display: none;">🖨️ Cetak Foto (Print)</button>
                </div>
            </div>
        </div>

        <!-- Scripts -->
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
